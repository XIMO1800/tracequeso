<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="El Hidalgo">
<meta name="theme-color" content="#6a1010">
<title>El Hidalgo — Trazabilidad</title>
<link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;500;600;700;800&family=Inconsolata:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f0e8; --bg2:#ffffff; --bg3:#ede7da; --border:#d4c9b5;
  --text:#2a1505; --text2:#5a3a20; --text3:#9a7a5a;
  --accent:#8b1a1a; --accent2:#a82020; --gold:#c8780a;
  --gold-bg:rgba(200,120,10,0.1); --green:#3a6a2a; --green-bg:rgba(58,106,42,0.1);
  --red:#8b1a1a; --red-bg:rgba(139,26,26,0.1); --blue:#1a3a6a;
  --blue-bg:rgba(26,58,106,0.1); --shadow:0 2px 8px rgba(42,21,5,0.1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'Karla',sans-serif;background:var(--bg);color:var(--text);}
.scr{display:none;position:fixed;inset:0;flex-direction:column;background:var(--bg);}
.scr.on{display:flex;}

/* TOPBAR */
.topbar{background:var(--bg2);border-bottom:2px solid var(--border);height:52px;display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;box-shadow:var(--shadow);}
.tbback{background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--text2);padding:2px 8px 2px 0;line-height:1;}
.tbtitle{font-family:'Karla',sans-serif;font-weight:700;font-size:0.95rem;color:var(--text);}
.tbright{margin-left:auto;display:flex;align-items:center;gap:8px;}
.tbuser{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:0.75rem;font-weight:600;color:var(--text2);cursor:pointer;}
.tbsync{font-family:'Inconsolata',monospace;font-size:0.66rem;padding:3px 7px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);}
.tbsync.ok{color:var(--green);border-color:rgba(26,138,74,0.3);}
.tbsync.err{color:var(--red);border-color:rgba(192,40,40,0.3);}
.tbsync.loading{color:var(--yellow, #c8780a);border-color:rgba(184,112,0,0.3);}

/* LOGIN & CARDS */
#s-login{background:linear-gradient(160deg,#2a0a05,#6a1010);align-items:center;justify-content:center;padding:20px;}
.lcard{background:#fff;border-radius:22px;padding:28px 22px;width:100%;max-width:340px;box-shadow:0 24px 60px rgba(0,0,0,0.35);}
.lsub{font-size:0.8rem;color:var(--text3);text-align:center;margin-bottom:20px;}
.lsel{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;font-family:'Karla',sans-serif;font-size:0.95rem;margin-bottom:14px;}
.pindisp{background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:14px;text-align:center;font-family:'Inconsolata',monospace;font-size:2rem;letter-spacing:0.4em;margin-bottom:14px;min-height:56px;}
.npad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
.npad button{padding:17px 8px;font-size:1.15rem;font-weight:700;background:var(--bg3);border:1.5px solid var(--border);border-radius:11px;cursor:pointer;}
.nok{background:var(--gold)!important;color:#fff!important;border-color:var(--gold)!important;}
.ndel{background:#fff0f0!important;color:var(--red)!important;border-color:#fcc!important;}

/* BUTTONS & FORMS */
.scrl{flex:1;overflow-y:auto;padding:14px;}
.mbtns{display:flex;flex-direction:column;gap:11px;}
.mbtn{background:var(--bg2);border:2px solid var(--border);border-radius:15px;padding:18px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;box-shadow:var(--shadow);text-align:left;}
.mbtn-title{font-weight:700;font-size:1.1rem;color:var(--text);}
.mbtn-desc{font-size:0.85rem;color:var(--text3);}
.mbtn.m1{border-left:5px solid var(--gold);}
.scan-mode{background:var(--bg2);border:2px solid var(--gold);border-radius:16px;padding:20px;text-align:center;margin-bottom:12px;}
.scan-mode-input{width:100%;background:var(--bg3);border:2px solid var(--gold);border-radius:10px;padding:14px;font-family:'Inconsolata',monospace;font-size:1.2rem;text-align:center;outline:none;}
.scan-counter{font-size:2.5rem;font-weight:800;color:var(--gold);margin-top:10px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--text);color:#fff;padding:10px 20px;border-radius:10px;font-size:0.85rem;z-index:9999;opacity:0;transition:0.25s;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
#v-offline-msg{background:var(--red-bg); color:var(--red); padding:10px; border-radius:10px; margin-bottom:10px; font-size:0.85rem; font-weight:700; border:1px solid var(--red); display:none;}
</style>
</head>
<body>

<div class="scr on" id="s-login">
  <div class="lcard">
    <div style="text-align:center;margin-bottom:10px;">
        <span style="font-size:1.5rem;font-weight:800;color:var(--accent)">EL HIDALGO</span>
    </div>
    <div class="lsub">Trazabilidad · Lácteos Cuquerella</div>
    <select class="lsel" id="l-nombre" onchange="resetPin()">
      <option value="">— Selecciona tu nombre —</option>
    </select>
    <div class="pindisp" id="l-pin">— — — —</div>
    <div class="npad">
      <button onclick="pd('1')">1</button><button onclick="pd('2')">2</button><button onclick="pd('3')">3</button>
      <button onclick="pd('4')">4</button><button onclick="pd('5')">5</button><button onclick="pd('6')">6</button>
      <button onclick="pd('7')">7</button><button onclick="pd('8')">8</button><button onclick="pd('9')">9</button>
      <button class="ndel" onclick="pb()">⌫</button>
      <button onclick="pd('0')">0</button>
      <button class="nok" onclick="pv()">✓</button>
    </div>
  </div>
</div>

<div class="scr" id="s-main">
  <div class="topbar">
    <div class="tbtitle">EL HIDALGO</div>
    <div class="tbright">
      <div class="tbsync ok" id="sync-badge">✅</div>
      <div class="tbuser" onclick="cerrarSesion()" id="tb-user">—</div>
    </div>
  </div>
  <div class="scrl">
    <div class="mbtns">
      <button class="mbtn m1" onclick="ir('s-volteo')">
        <div style="font-size:2rem">🔄</div>
        <div><div class="mbtn-title">Volteo de quesos</div><div class="mbtn-desc">Registrar volteos en secadero</div></div>
      </button>
      <button class="mbtn m1" style="border-left-color:var(--blue)" onclick="toast('Próximamente','ok')">
        <div style="font-size:2rem">🚚</div>
        <div><div class="mbtn-title">Movimiento</div><div class="mbtn-desc">Cambiar palés de sala</div></div>
      </button>
    </div>
  </div>
</div>

<div class="scr" id="s-volteo">
  <div class="topbar">
    <button class="tbback" onclick="ir('s-main')">←</button>
    <div class="tbtitle">🔄 Registrar Volteo</div>
  </div>
  <div class="scrl">
    <div id="v-offline-msg">⚠️ Tienes registros pendientes de enviar (sin cobertura).</div>
    <div class="scan-mode">
      <div style="font-size:3rem">🔄</div>
      <div style="font-weight:700;margin-bottom:10px">Escanea el QR del palé</div>
      <input class="scan-mode-input" type="text" inputmode="none" id="v-qr" placeholder="QR del palé..." onkeydown="onVolteoKey(event)">
      <div class="scan-counter" id="v-cnt">0</div>
      <div style="font-size:0.8rem;color:var(--text3)">palés volteados en esta sesión</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════ CONFIGURACIÓN ═══════
var API_URL = 'https://script.google.com/macros/s/AKfycbzRpl0519TiKvlfVZqEK12oZDfUCn9bNrJVT4kRDyni3pCxLg7FTMKmssgeKGJMWEP0/exec';
var USUARIOS = [
  {n:'JOAQUIN', pin:'2205'},
  {n:'ALFONSO', pin:'3663'}
];
var CU = null, cpin = '';
var sincronizando = false; // El Semáforo 🚦

// ═══════ SISTEMA DE SEGURIDAD (LIBRETA + SEMÁFORO) ═══════

function guardarEnLibretaLocal(registro) {
    let libreta = JSON.parse(localStorage.getItem('libreta_el_hidalgo') || '[]');
    libreta.push(registro);
    localStorage.setItem('libreta_el_hidalgo', JSON.stringify(libreta));
    actualizarAvisoPendientes();
}

async function sincronizarLibreta() {
    if (!navigator.onLine || sincronizando) return; 
    
    let libreta = JSON.parse(localStorage.getItem('libreta_el_hidalgo') || '[]');
    if (libreta.length === 0) return;

    sincronizando = true; 
    setSB('loading', '⟳ ' + libreta.length);

    try {
        while (true) {
            let actual = JSON.parse(localStorage.getItem('libreta_el_hidalgo') || '[]');
            if (actual.length === 0) break;

            let reg = actual[0]; 

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(reg),
                    headers: {'Content-Type': 'application/json'}
                });
                
                // Borramos solo el que acabamos de enviar con éxito
                let despues = JSON.parse(localStorage.getItem('libreta_el_hidalgo') || '[]');
                despues = despues.filter(item => item.ID !== reg.ID);
                localStorage.setItem('libreta_el_hidalgo', JSON.stringify(despues));
                setSB('loading', '⟳ ' + despues.length);
                
            } catch (e) {
                break; // Si hay error de red, paramos y esperamos a la siguiente conexión
            }
        }
    } finally {
        sincronizando = false;
        actualizarAvisoPendientes();
    }
}

function actualizarAvisoPendientes() {
    let libreta = JSON.parse(localStorage.getItem('libreta_el_hidalgo') || '[]');
    let msg = document.getElementById('v-offline-msg');
    if (msg) msg.style.display = libreta.length > 0 ? 'block' : 'none';
    
    let badge = document.getElementById('sync-badge');
    if (libreta.length > 0) {
        badge.textContent = '☁️ ' + libreta.length;
        badge.className = 'tbsync err';
    } else {
        badge.textContent = '✅';
        badge.className = 'tbsync ok';
    }
}

function guardarRegistro(datos) {
    // Generamos un ID único para que no se pisen
    datos['ID'] = 'REG-' + Date.now() + '-' + Math.random().toString(36).substring(2, 7);
    datos['FECHA'] = new Date().toLocaleString('es-ES');
    
    // Guardamos siempre en el móvil primero (Libreta)
    guardarEnLibretaLocal(datos);
    
    toast('💾 Registrado en el móvil');
    
    // Intentamos enviar lo que haya en la cola
    sincronizarLibreta();
}

// ═══════ LÓGICA DE INTERFAZ ═══════

function pd(d){if(cpin.length>=4)return; cpin+=d; updPin(); if(cpin.length===4)setTimeout(pv,150);}
function pb(){cpin=cpin.slice(0,-1); updPin();}
function resetPin(){cpin=''; updPin();}
function updPin(){
    var s=''; for(var i=0;i<4;i++) s+=(i<cpin.length?'●':'—')+' '; 
    document.getElementById('l-pin').textContent=s;
}

function pv(){
  var nom = document.getElementById('l-nombre').value;
  var u = USUARIOS.find(x => x.n === nom);
  if(!u || u.pin !== cpin){ toast('PIN Incorrecto','err'); resetPin(); return; }
  CU = u;
  document.getElementById('tb-user').textContent = u.n;
  ir('s-main');
  sincronizarLibreta();
}

function ir(id){
  document.querySelectorAll('.scr').forEach(s => s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

function onVolteoKey(e){
  if(e.key === 'Enter'){
    var val = e.target.value.trim();
    if(val){
      guardarRegistro({
          'ID PALET': val,
          'SECCIÓN': 'VOLTEO',
          'OPERARIO': CU.n,
          'SALA DESTINO': 'SECADERO'
      });
      e.target.value = '';
      let cnt = document.getElementById('v-cnt');
      cnt.textContent = parseInt(cnt.textContent) + 1;
    }
  }
}

function setSB(cls,txt){ var el=document.getElementById('sync-badge'); el.className='tbsync '+cls; el.textContent=txt; }
function toast(msg,type){
    var t=document.getElementById('toast'); t.textContent=msg; 
    t.className='toast '+(type==='err'?'err':'ok')+' show';
    setTimeout(()=>t.className='toast',3000);
}
function cerrarSesion(){ CU=null; resetPin(); ir('s-login'); }

// Al arrancar
(function(){
    let sel = document.getElementById('l-nombre');
    USUARIOS.forEach(u => { let o = document.createElement('option'); o.value=u.n; o.textContent=u.n; sel.appendChild(o); });
    actualizarAvisoPendientes();
    window.addEventListener('online', sincronizarLibreta);
    setInterval(sincronizarLibreta, 60000); // Intenta sincronizar cada minuto por si acaso
})();

// Service Worker para offline
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(() => console.log("PWA lista"));
}
</script>
</body>
</html>
